services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      target: api
    ports:
      - "127.0.0.1:8010:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - tmp_data:/data/tmp
      - failed_crm:/data/failed_crm
      - ./service_account_key.json:/app/service_account_key.json:ro
    restart: unless-stopped
    stop_grace_period: 300s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3010:80"
    restart: unless-stopped

volumes:
  redis_data:
  tmp_data:
  failed_crm:
