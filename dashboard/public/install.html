<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Установка ОКК Дашборд</title>
  <script src="https://unpkg.com/@bitrix24/b24jssdk@latest/dist/umd/index.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f7fa;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    h1 { font-size: 20px; color: #333; margin-bottom: 8px; }
    p { color: #888; font-size: 14px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #2196f3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    .success { color: #4caf50; font-size: 32px; }
    .error { color: #f44336; font-size: 14px; margin-top: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <h1>Установка ОКК Дашборд</h1>
      <p>Подождите...</p>
    </div>
    <div id="success" style="display:none">
      <div class="success">&#10003;</div>
      <h1>Установка завершена</h1>
      <p>Приложение доступно в меню</p>
    </div>
    <div id="error-msg" class="error" style="display:none"></div>
  </div>
  <script type="module">
    try {
      const $b24 = await B24Js.initializeB24Frame();
      $b24.installFinish();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-msg').textContent = 'Ошибка: ' + e.message;
    }
  </script>
</body>
</html>
